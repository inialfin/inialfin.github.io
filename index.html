<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apple Login Simple</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">

    <div class="bg-white p-8 rounded-xl shadow-md text-center max-w-sm w-full">
        <h2 class="text-2xl font-bold mb-6 text-gray-800">Welcome Back</h2>
        
        <button id="apple-signin-btn" class="flex items-center justify-center w-full bg-black text-white font-medium py-3 px-4 rounded-lg hover:bg-gray-900 transition duration-200 cursor-pointer">
            <svg class="w-5 h-5 mr-3" viewBox="0 0 170 170" fill="currentColor">
                <path d="M150.37 130.25c-2.45 5.66-5.35 10.87-8.71 15.66-4.58 6.53-8.33 11.05-11.22 13.56-4.48 4.12-9.28 6.23-14.42 6.35-3.69 0-8.14-1.05-13.32-3.18-5.19-2.12-9.97-3.17-14.34-3.17-4.58 0-9.49 1.05-14.75 3.17-5.26 2.13-9.5 3.24-12.74 3.35-4.38.13-9.13-1.84-14.26-5.9-3.44-2.77-7.45-7.55-12.01-14.35-10.85-15.94-18.64-35.16-23.38-57.65-2.26-10.8-3.4-21.44-3.4-31.91 0-15.06 3.73-27.11 11.19-36.14 7.46-9.03 16.66-13.62 27.61-13.78 5.13 0 10.77 1.43 16.92 4.3 6.15 2.87 10.33 4.3 12.54 4.3 2.1 0 6.46-1.5 13.08-4.49 6.63-2.99 11.96-4.42 16.01-4.29 14.57.64 25.68 6.01 33.34 16.12-11.75 7.15-17.5 16.89-17.25 29.21.25 9.77 3.86 17.86 10.82 24.27 6.97 6.41 15.1 10.02 24.41 10.85-2.25 6.69-5.12 13.34-8.61 19.94zM119.22 30.15c0-7.78 2.76-14.99 8.29-21.65 5.53-6.65 12.42-10.75 20.65-12.3 1.02 8.32-1.27 16.27-6.89 23.86-5.61 7.59-12.87 11.75-21.79 12.49-.13-.83-.26-1.63-.26-2.4z"/>
            </svg>
            Sign in with Apple
        </button>

        <div id="result" class="mt-6 text-left hidden">
            <p class="text-sm font-semibold text-green-600 mb-1">Authorization Code Berhasil Didapat:</p>
            <textarea id="code-output" class="w-full p-2 text-xs bg-gray-50 border border-gray-200 rounded-md h-24 font-mono select-all" readonly></textarea>
        </div>
    </div>

    <script type="text/javascript" src="https://appleid.cdn-apple.com/appleauth/static/jsapi/appleid/1/en_US/appleid.auth.js"></script>

    <script type="text/javascript">
        // 2. Inisialisasi Konfigurasi Apple Auth
        // Silakan sesuaikan Client ID dan Redirect URI dengan akun Apple Developer Anda
        AppleID.auth.init({
            clientId : 'com.cs.app.shiratha', // Ganti dengan Service ID Anda dari Apple Developer Portal
            scope : 'name email',
            redirectURI : 'https://inialfin.github.io/api/user/auth/driver/apple/callback', // Ganti dengan Redirect URI yang valid dan HTTPS
            state : 'state123',
            usePopup : true, // Menggunakan popup agar JavaScript bisa langsung menangkap response-nya
            responseType : 'code',
            responseMode : 'fragment'
        });

        // 3. Event Listener saat tombol diklik
        document.getElementById('apple-signin-btn').addEventListener('click', async () => {
            try {
                // Memicu popup login Apple
                const response = await AppleID.auth.signIn();
                
                // 4. Menangkap Authorization Code dari response
                if (response && response.authorization) {
                    const authCode = response.authorization.code;
                    
                    // Tampilkan di halaman
                    document.getElementById('result').classList.remove('hidden');
                    document.getElementById('code-output').value = authCode;
                    
                    console.log('Authorization Code:', authCode);
                    // Catatan: Kirim authCode ini ke backend Laravel Anda untuk diverifikasi lebih lanjut
                }
            } catch (error) {
                console.error('Apple Login Error:', error);
                alert('Login gagal atau dibatalkan.');
            }
        });
    </script>

</body>
</html>
